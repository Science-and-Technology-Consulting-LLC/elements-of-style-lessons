name: eos-lessons
# Minimal env: enough to run the starter notebooks (Python + R) and build
# the Sphinx docs locally. The book companion (elements-of-style-workflows)
# has the heavier biomedical stack (scanpy, scvi-tools, Seurat, etc.).
channels:
  - conda-forge
  - defaults
  - r
dependencies:
  # --- Python kernel + starter notebook ---
  - python=3.10
  - jupyterlab
  - ipykernel
  - pandas
  - matplotlib

  # --- R kernel + starter notebook ---
  - r-base
  - r-irkernel
  - r-tibble
  - r-dplyr
  - r-ggplot2

  # --- Bash kernel (optional but matches book companion's eos env) ---
  - bash_kernel

  # --- Sphinx docs build ---
  # Pins reflect the known-good stack: Sphinx 8+/9 breaks an API that
  # myst-parser <4 patches against. Keep aligned with docs.yml.
  - sphinx>=7,<7.3
  - sphinx-rtd-theme
  - "myst-parser>=2,<4"
  - "myst-nb<1.2"
  - sphinx-copybutton
  - sphinx-design
  - linkify-it-py
  - nbstripout

  - pip
  - pip:
      - typer        # featured in the "Reusable CLIs" lesson
